<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Cosmic Blaster</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --cyan:   #00f5ff;
      --pink:   #ff006e;
      --yellow: #ffe600;
      --bg:     #020810;
    }
    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background:var(--bg);
      touch-action:none;
      user-select:none;
      -webkit-user-select:none;
    }
    /* Fix for mobile browser address bar eating screen space */
    #game-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }
    canvas {
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      display:block;
    }

    /* HUD */
    #hud {
      position:fixed; top:0; left:0; right:0;
      display:flex; justify-content:space-between; align-items:flex-start;
      padding:12px 16px;
      pointer-events:none; z-index:10;
    }
    #hud-score {
      font-family:'Orbitron',sans-serif;
      font-size:clamp(13px,4.5vw,20px);
      color:var(--cyan); text-shadow:0 0 10px var(--cyan);
    }
    #hud-level {
      font-family:'Orbitron',sans-serif;
      font-size:clamp(10px,3vw,13px);
      color:var(--yellow); text-shadow:0 0 8px var(--yellow);
      margin-top:3px;
    }
    #hud-lives { font-size:clamp(16px,5.5vw,26px); letter-spacing:3px; }

    /* ── Controls bar ── */
    #controls {
      position:fixed; bottom:0; left:0; right:0;
      height:160px;
      display:flex; justify-content:space-between; align-items:center;
      padding:0 30px 20px;
      pointer-events:none;
      z-index:15;
    }
    #controls.hidden { display:none; }

    /* Joystick */
    #joystick-zone {
      position:relative;
      width:110px; height:110px;
      pointer-events:all;
    }
    #joystick-base {
      position:absolute; inset:0;
      border-radius:50%;
      border:2px solid rgba(0,245,255,0.35);
      background:rgba(0,245,255,0.05);
      box-shadow:0 0 18px rgba(0,245,255,0.15), inset 0 0 18px rgba(0,245,255,0.05);
    }
    /* Cross-hair lines inside base */
    #joystick-base::before,
    #joystick-base::after {
      content:'';
      position:absolute;
      background:rgba(0,245,255,0.18);
    }
    #joystick-base::before { left:50%; top:10%; width:1px; height:80%; transform:translateX(-50%); }
    #joystick-base::after  { top:50%; left:10%; height:1px; width:80%; transform:translateY(-50%); }

    #joystick-knob {
      position:absolute;
      width:46px; height:46px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, rgba(0,245,255,0.9), rgba(0,180,220,0.6));
      border:2px solid rgba(0,245,255,0.8);
      box-shadow:0 0 16px rgba(0,245,255,0.6), 0 0 32px rgba(0,245,255,0.2);
      top:50%; left:50%;
      transform:translate(-50%, -50%);
      transition:box-shadow 0.1s;
      pointer-events:none;
    }
    #joystick-knob.active {
      box-shadow:0 0 28px rgba(0,245,255,0.9), 0 0 50px rgba(0,245,255,0.4);
    }

    /* Shoot button */
    #shoot-btn {
      width:94px; height:94px;
      border-radius:50%;
      border:3px solid var(--yellow);
      background:rgba(255,230,0,0.08);
      color:var(--yellow);
      font-size:36px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      box-shadow:0 0 22px rgba(255,230,0,0.35);
      pointer-events:all;
      transition:background 0.08s, box-shadow 0.08s;
    }
    #shoot-btn.pressed {
      background:rgba(255,230,0,0.22);
      box-shadow:0 0 44px rgba(255,230,0,0.7);
    }

    /* Overlay */
    #overlay {
      position:fixed; top:0; left:0;
      width:100%;
      height: var(--vh, 100%);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:rgba(2,8,16,0.93);
      z-index:30; gap:16px;
      padding: 80px 24px 24px;
    }
    #overlay h1 {
      font-family:'Orbitron',sans-serif;
      font-size:clamp(26px,8vw,52px);
      font-weight:900; color:var(--cyan);
      text-shadow:0 0 30px var(--cyan), 0 0 70px var(--cyan);
      text-align:center;
    }
    #overlay .sub {
      color:rgba(255,255,255,0.5);
      font-family:'Share Tech Mono',monospace;
      font-size:clamp(11px,3.5vw,15px);
      text-align:center; max-width:300px; line-height:1.6;
    }
    #overlay .final-score {
      font-family:'Orbitron',sans-serif;
      font-size:clamp(22px,7vw,38px);
      color:var(--yellow); text-shadow:0 0 20px var(--yellow);
    }
    #start-btn {
      font-family:'Orbitron',sans-serif;
      font-size:clamp(14px,4.5vw,20px);
      font-weight:700; letter-spacing:2px;
      padding:16px 44px;
      border:2px solid var(--cyan);
      background:transparent; color:var(--cyan);
      border-radius:6px;
      text-shadow:0 0 8px var(--cyan);
      box-shadow:0 0 24px rgba(0,245,255,0.3);
      cursor:pointer; margin-top:8px;
      -webkit-tap-highlight-color:transparent;
      transition:all 0.15s;
    }
    #start-btn:active { background:rgba(0,245,255,0.15); transform:scale(0.96); }
    .ctrl-hint {
      display:flex; gap:28px; align-items:center; margin-top:4px;
    }
    .hint-item {
      display:flex; flex-direction:column; align-items:center; gap:6px;
    }
    .hint-icon { font-size:26px; }
    .hint-label {
      color:rgba(255,255,255,0.38);
      font-family:'Share Tech Mono',monospace;
      font-size:clamp(9px,2.5vw,11px);
      text-align:center;
    }
    #overlay.hidden { display:none; }

    @keyframes flicker {
      0%,94%,100%{opacity:1;} 95%{opacity:0.75;} 97%{opacity:0.4;}
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div>
    <div id="hud-score">SCORE: 0</div>
    <div id="hud-level">LEVEL 1</div>
    <div id="hud-best" style="font-family:'Orbitron',sans-serif;font-size:clamp(9px,2.5vw,12px);color:#ff006e;text-shadow:0 0 8px #ff006e;margin-top:2px;">BEST: 0</div>
  </div>
  <div id="hud-lives">❤️❤️❤️</div>
</div>

<!-- Controls -->
<div id="controls" class="hidden">
  <!-- LEFT: Joystick -->
  <div id="joystick-zone">
    <div id="joystick-base"></div>
    <div id="joystick-knob"></div>
  </div>
  <!-- RIGHT: Shoot -->
  <div id="shoot-btn">🔥</div>
</div>

<!-- Overlay -->
<div id="overlay">
  <h1 id="ov-title">COSMIC<br>BLASTER</h1>
  <p class="sub" id="ov-sub">Destroy asteroids. Survive the void.</p>
  <div class="final-score" id="ov-score" style="display:none"></div>
  <div class="final-score" id="ov-best" style="display:none;font-size:clamp(14px,4vw,22px);color:#ff006e;text-shadow:0 0 14px #ff006e;"></div>
  <button id="start-btn">▶ START GAME</button>
  <div class="ctrl-hint">
    <div class="hint-item">
      <span class="hint-icon">🕹️</span>
      <span class="hint-label">JOYSTICK<br>MOVE</span>
    </div>
    <div class="hint-item">
      <span class="hint-icon">🔥</span>
      <span class="hint-label">HOLD TO<br>SHOOT</span>
    </div>
  </div>
</div>

<script>
"use strict";

// ════════════════════════════════════════════════
//  SOUND ENGINE  (Web Audio API – no files needed)
// ════════════════════════════════════════════════
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playShoot() {
  const ac = getAudio();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = "square";
  osc.frequency.setValueAtTime(880, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(220, ac.currentTime + 0.1);
  gain.gain.setValueAtTime(0.15, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
  osc.start(); osc.stop(ac.currentTime + 0.1);
}

function playAsteroidExplode() {
  const ac = getAudio();
  const bufSize = ac.sampleRate * 0.25;
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random()*2-1);
  const src = ac.createBufferSource();
  const gain = ac.createGain();
  const filter = ac.createBiquadFilter();
  src.buffer = buf;
  filter.type = "bandpass";
  filter.frequency.value = 180;
  filter.Q.value = 0.8;
  src.connect(filter); filter.connect(gain); gain.connect(ac.destination);
  gain.gain.setValueAtTime(0.4, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
  src.start(); src.stop(ac.currentTime + 0.25);
}

function playHit() {
  const ac = getAudio();
  const bufSize = ac.sampleRate * 0.2;
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random()*2-1);
  const src = ac.createBufferSource();
  const gain = ac.createGain();
  const filter = ac.createBiquadFilter();
  src.buffer = buf;
  filter.type = "lowpass";
  filter.frequency.value = 400;
  src.connect(filter); filter.connect(gain); gain.connect(ac.destination);
  gain.gain.setValueAtTime(0.5, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
  src.start(); src.stop(ac.currentTime + 0.2);
}

function playShipDeath() {
  const ac = getAudio();
  // Low rumble
  const bufSize = ac.sampleRate * 1.2;
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random()*2-1);
  const src = ac.createBufferSource();
  const gain = ac.createGain();
  const filter = ac.createBiquadFilter();
  src.buffer = buf;
  filter.type = "lowpass";
  filter.frequency.setValueAtTime(600, ac.currentTime);
  filter.frequency.exponentialRampToValueAtTime(40, ac.currentTime + 1.2);
  src.connect(filter); filter.connect(gain); gain.connect(ac.destination);
  gain.gain.setValueAtTime(0.7, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 1.2);
  src.start(); src.stop(ac.currentTime + 1.2);
  // High pitched scream on top
  const osc = ac.createOscillator();
  const oscGain = ac.createGain();
  osc.connect(oscGain); oscGain.connect(ac.destination);
  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(600, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(40, ac.currentTime + 0.8);
  oscGain.gain.setValueAtTime(0.3, ac.currentTime);
  oscGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.8);
  osc.start(); osc.stop(ac.currentTime + 0.8);
}

function playLevelUp() {
  const ac = getAudio();
  [523, 659, 784, 1047].forEach((freq, i) => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = "sine";
    osc.frequency.value = freq;
    const t = ac.currentTime + i * 0.1;
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.start(t); osc.stop(t + 0.15);
  });
}
// ════════════════════════════════════════════════
//  COSMIC BLASTER  –  Grade 4 IT Term 3 Project
//  States : START → PLAYING → GAME_OVER
//  Classes: Ship, Bullet, Asteroid, Particle
//  Input  : Virtual joystick (left) + shoot btn (right)
// ════════════════════════════════════════════════

const canvas = document.getElementById("gameCanvas");
const ctx    = canvas.getContext("2d");

function resizeCanvas() {
  // Use visualViewport if available — correctly excludes browser chrome on mobile
  const W = window.visualViewport ? window.visualViewport.width  : window.innerWidth;
  const H = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  canvas.width  = W;
  canvas.height = H;
  // Also set a CSS variable so controls stay inside visible area
  document.documentElement.style.setProperty('--vh', H + 'px');
}
resizeCanvas();
window.addEventListener("resize", () => { resizeCanvas(); initStars(); });
if(window.visualViewport){
  window.visualViewport.addEventListener("resize", () => { resizeCanvas(); initStars(); });
  window.visualViewport.addEventListener("scroll", resizeCanvas);
}

// ── Game states ──────────────────────────────────
const STATE   = { START:"START", PLAYING:"PLAYING", DYING:"DYING", GAME_OVER:"GAME_OVER" };
let gameState = STATE.START;

let score = 0, lives = 3, level = 1;
let frameCount = 0, spawnRate = 80, rafId = null;
let highScore = parseInt(localStorage.getItem("cosmicHighScore")) || 0;
let shipExploding = false; // true while death explosion plays

// ── DOM refs ─────────────────────────────────────
const hudScore  = document.getElementById("hud-score");
const hudLives  = document.getElementById("hud-lives");
const hudLevel  = document.getElementById("hud-level");
const hudBest   = document.getElementById("hud-best");
const overlay   = document.getElementById("overlay");
const ovTitle   = document.getElementById("ov-title");
const ovSub     = document.getElementById("ov-sub");
const ovScore   = document.getElementById("ov-score");
const ovBest    = document.getElementById("ov-best");
const startBtn  = document.getElementById("start-btn");
const controls  = document.getElementById("controls");
const joyZone   = document.getElementById("joystick-zone");
const joyKnob   = document.getElementById("joystick-knob");
const shootBtn  = document.getElementById("shoot-btn");

// ════════════════════════════════════════════════
//  JOYSTICK
// ════════════════════════════════════════════════
const JOY_RADIUS = 55; // max knob travel from centre (px)
const joy = {
  active:  false,
  touchId: null,
  baseX:   0,
  baseY:   0,
  dx:      0,   // -1 … +1  (horizontal axis)
  dy:      0    // -1 … +1  (vertical axis – not used for movement but kept for future)
};

function joyStart(e) {
  e.preventDefault();
  const t = e.changedTouches ? e.changedTouches[0] : e;
  joy.active  = true;
  joy.touchId = t.identifier ?? null;
  const rect  = joyZone.getBoundingClientRect();
  joy.baseX   = rect.left + rect.width  / 2;
  joy.baseY   = rect.top  + rect.height / 2;
  joyKnob.classList.add("active");
  updateJoy(t.clientX, t.clientY);
}

function joyMove(e) {
  e.preventDefault();
  if (!joy.active) return;
  let t = null;
  if (e.changedTouches) {
    for (let i = 0; i < e.changedTouches.length; i++) {
      if (e.changedTouches[i].identifier === joy.touchId) {
        t = e.changedTouches[i]; break;
      }
    }
  } else { t = e; }
  if (t) updateJoy(t.clientX, t.clientY);
}

function joyEnd(e) {
  e.preventDefault();
  joy.active = false; joy.dx = 0; joy.dy = 0;
  joyKnob.style.transform = "translate(-50%, -50%)";
  joyKnob.classList.remove("active");
}

function updateJoy(cx, cy) {
  let dx = cx - joy.baseX;
  // Lock to horizontal only — ignore vertical
  const dist = Math.abs(dx);
  if (dist > JOY_RADIUS) dx = Math.sign(dx) * JOY_RADIUS;
  joy.dx = dx / JOY_RADIUS;
  joy.dy = 0;
  // Move knob visually (horizontal only)
  joyKnob.style.transform = `translate(calc(-50% + ${dx}px), -50%)`;
}

joyZone.addEventListener("touchstart",  joyStart, {passive:false});
joyZone.addEventListener("touchmove",   joyMove,  {passive:false});
joyZone.addEventListener("touchend",    joyEnd,   {passive:false});
joyZone.addEventListener("touchcancel", joyEnd,   {passive:false});
// Mouse fallback (desktop testing)
joyZone.addEventListener("mousedown",  joyStart);
window.addEventListener("mousemove",   e => { if (joy.active) joyMove(e); });
window.addEventListener("mouseup",     e => { if (joy.active) joyEnd(e); });

// ── Shoot button ─────────────────────────────────
const shootState = { pressed: false };
function shootOn(e)  { e.preventDefault(); shootState.pressed=true;  shootBtn.classList.add("pressed"); }
function shootOff(e) { e.preventDefault(); shootState.pressed=false; shootBtn.classList.remove("pressed"); }
shootBtn.addEventListener("touchstart",  shootOn,  {passive:false});
shootBtn.addEventListener("touchend",    shootOff, {passive:false});
shootBtn.addEventListener("touchcancel", shootOff, {passive:false});
shootBtn.addEventListener("mousedown",   shootOn);
shootBtn.addEventListener("mouseup",     shootOff);
shootBtn.addEventListener("mouseleave",  shootOff);

// Keyboard (desktop)
window.addEventListener("keydown", e => {
  if (e.key==="ArrowLeft"  || e.key==="a") { joy.active=true; joy.dx=-1; }
  if (e.key==="ArrowRight" || e.key==="d") { joy.active=true; joy.dx= 1; }
  if (e.code==="Space") { e.preventDefault(); shootState.pressed=true; }
});
window.addEventListener("keyup", e => {
  if (e.key==="ArrowLeft"  || e.key==="a") { joy.dx=0; joy.active=false; }
  if (e.key==="ArrowRight" || e.key==="d") { joy.dx=0; joy.active=false; }
  if (e.code==="Space") shootState.pressed=false;
});

// ── Stars ────────────────────────────────────────
const STARS = [];
function initStars() {
  STARS.length = 0;
  for (let i = 0; i < 140; i++) STARS.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.5+0.2,
    b: Math.random()
  });
}
initStars();

// ════════════════════════════════════════════════
//  CLASS: Ship
// ════════════════════════════════════════════════
class Ship {
  constructor() {
    this.w = 46; this.h = 56;
    this.x = canvas.width / 2;
    this.y = canvas.height - 120;
    this.vx = 0;
    this.maxSpeed   = 9;
    this.invincible = 0;
    this.shootTimer = 0;
    this.shootRate  = 16;
  }

  update() {
    // Joystick drives velocity directly – responsive feel
    if (joy.active && Math.abs(joy.dx) > 0.08) {
      this.vx += joy.dx * 1.1;
      this.vx  = Math.max(-this.maxSpeed, Math.min(this.maxSpeed, this.vx));
    } else {
      this.vx *= 0.78; // friction when stick released
    }

    this.x += this.vx;
    this.x  = Math.max(this.w/2, Math.min(canvas.width - this.w/2, this.x));

    // Auto-fire while shoot held
    if (shootState.pressed) {
      if (this.shootTimer <= 0) {
        bullets.push(new Bullet(this.x, this.y - this.h/2));
        playShoot();
        this.shootTimer = this.shootRate;
      }
    }
    if (this.shootTimer  > 0) this.shootTimer--;
    if (this.invincible  > 0) this.invincible--;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.shadowBlur = 20; ctx.shadowColor = "#00f5ff";

    // Body
    ctx.fillStyle = "#00c8ff";
    ctx.beginPath();
    ctx.moveTo(0, -this.h/2);
    ctx.lineTo( this.w/2,    this.h/2);
    ctx.lineTo( this.w*0.15, this.h*0.22);
    ctx.lineTo(-this.w*0.15, this.h*0.22);
    ctx.lineTo(-this.w/2,    this.h/2);
    ctx.closePath(); ctx.fill();

    // Cockpit
    ctx.fillStyle="#001833"; ctx.shadowBlur=6; ctx.shadowColor="#00f5ff";
    ctx.beginPath(); ctx.ellipse(0,-6,9,13,0,0,Math.PI*2); ctx.fill();

    // Wing lines
    ctx.strokeStyle="rgba(0,245,255,0.5)"; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(this.w*0.15,this.h*0.22); ctx.lineTo(this.w/2,this.h/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-this.w*0.15,this.h*0.22); ctx.lineTo(-this.w/2,this.h/2); ctx.stroke();

    // Engine flame (animated)
    const fH = 18 + Math.sin(frameCount*0.35)*7;
    const g  = ctx.createLinearGradient(0,this.h*0.22,0,this.h*0.22+fH);
    g.addColorStop(0,"#fff"); g.addColorStop(0.3,"#00aaff"); g.addColorStop(1,"transparent");
    ctx.fillStyle=g; ctx.shadowBlur=24; ctx.shadowColor="#0af";
    ctx.beginPath(); ctx.moveTo(-9,this.h*0.22); ctx.lineTo(9,this.h*0.22); ctx.lineTo(0,this.h*0.22+fH); ctx.closePath(); ctx.fill();

    ctx.restore();
  }

  get hitbox() { return { x:this.x-14, y:this.y-22, w:28, h:42 }; }
}

// ════════════════════════════════════════════════
//  CLASS: Bullet
// ════════════════════════════════════════════════
class Bullet {
  constructor(x, y) { this.x=x; this.y=y; this.w=5; this.h=18; this.vy=-15; this.alive=true; }
  update() {
    this.y+=this.vy;
    if(this.y+this.h<0) this.alive=false;
    // Trail particles every frame
    if(Math.random()<0.7) particles.push(new TrailParticle(this.x, this.y+this.h));
  }
  draw() {
    ctx.save();
    ctx.shadowBlur=16; ctx.shadowColor="#ffe600";
    const g=ctx.createLinearGradient(0,this.y,0,this.y+this.h);
    g.addColorStop(0,"#ffe600"); g.addColorStop(1,"transparent");
    ctx.fillStyle=g; ctx.fillRect(this.x-this.w/2,this.y,this.w,this.h);
    ctx.restore();
  }
}

// ════════════════════════════════════════════════
//  CLASS: Asteroid
// ════════════════════════════════════════════════
class Asteroid {
  constructor() {
    this.r     = 20 + Math.random()*24;
    this.x     = this.r + Math.random()*(canvas.width-this.r*2);
    this.y     = -this.r;
    this.vy    = (1.4+Math.random()*1.8)*(1+(level-1)*0.15);
    this.vx    = (Math.random()-0.5)*1.4;
    this.angle = 0; this.spin=(Math.random()-0.5)*0.05;
    this.alive = true; this.hue=15+Math.floor(Math.random()*35);
    this.pts   = [];
    const sides = 7+Math.floor(Math.random()*4);
    for(let i=0;i<sides;i++){
      const a=(i/sides)*Math.PI*2;
      const r=this.r*(0.68+Math.random()*0.32);
      this.pts.push({x:Math.cos(a)*r, y:Math.sin(a)*r});
    }
  }
  update() {
    this.y+=this.vy; this.x+=this.vx; this.angle+=this.spin;
    if(this.y-this.r>canvas.height) this.alive=false;
  }
  draw() {
    ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.angle);
    ctx.shadowBlur=14; ctx.shadowColor=`hsl(${this.hue},80%,55%)`;
    ctx.fillStyle=`hsl(${this.hue},50%,26%)`;
    ctx.strokeStyle=`hsl(${this.hue},90%,60%)`; ctx.lineWidth=2.5;
    ctx.beginPath();
    this.pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
}

// ════════════════════════════════════════════════
//  CLASS: TrailParticle  (bullet smoke trail)
// ════════════════════════════════════════════════
class TrailParticle {
  constructor(x, y) {
    this.x    = x + (Math.random()-0.5)*4;
    this.y    = y;
    this.vx   = (Math.random()-0.5)*1.2;
    this.vy   = Math.random()*1.5+0.5; // drifts downward
    this.life = 0.6+Math.random()*0.3;
    this.decay= 0.06+Math.random()*0.05;
    this.r    = 1+Math.random()*2.5;
    // Yellow → orange → transparent
    this.color= Math.random()<0.5 ? "#ffe600" : "#ff8800";
  }
  update() {
    this.x   +=this.vx; this.y+=this.vy;
    this.r   *=0.92;
    this.life-=this.decay;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha=Math.max(0,this.life*0.7);
    ctx.shadowBlur =6; ctx.shadowColor=this.color;
    ctx.fillStyle  =this.color;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

class Particle {
  constructor(x, y, color, angle, speed) {
    this.x = x; this.y = y;
    const a = angle ?? Math.random()*Math.PI*2;
    const s = speed ?? (3+Math.random()*4);
    this.vx = Math.cos(a)*s*(0.8+Math.random()*0.4);
    this.vy = Math.sin(a)*s*(0.8+Math.random()*0.4);
    this.life = 1;
    this.decay = 0.03+Math.random()*0.04;
    this.r = 2+Math.random()*4;
    this.color = color;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.93; this.vy *= 0.93;
    this.vy += 0.08;
    this.life -= this.decay;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.shadowBlur = 10; ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Entity arrays ────────────────────────────────
let ship=new Ship(), bullets=[], asteroids=[], particles=[];

// ── Helpers ──────────────────────────────────────
function circleRect(cx,cy,cr,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));
  const dx=cx-nx,dy=cy-ny;
  return dx*dx+dy*dy<cr*cr;
}
function spawnExplosion(x, y, type) {
  if(type === "asteroid") {
    for(let i=0;i<8;i++) particles.push(new Particle(x,y,"#ffe600"));
    for(let i=0;i<5;i++) particles.push(new Particle(x,y,"#ff6600"));
  } else if(type === "ship") {
    // Ring of cyan sparks outward
    for(let i=0;i<12;i++){
      const angle = (i/12)*Math.PI*2;
      particles.push(new Particle(x,y,"#00f5ff", angle, 5+Math.random()*4));
    }
    // Inner white flash
    for(let i=0;i<8;i++) particles.push(new Particle(x,y,"#ffffff", Math.random()*Math.PI*2, 2+Math.random()*3));
    // Pink embers
    for(let i=0;i<8;i++) particles.push(new Particle(x,y,"#ff006e", Math.random()*Math.PI*2, 1+Math.random()*5));
  } else if(type === "hit") {
    for(let i=0;i<6;i++) particles.push(new Particle(x,y,"#ff006e"));
  }
}
function updateHUD(){
  hudScore.textContent="SCORE: "+score;
  hudLevel.textContent="LEVEL "+level;
  hudLives.textContent="❤️".repeat(Math.max(0,lives))||"💀";
  hudBest.textContent="BEST: "+highScore;
}
function updateLevel(){
  const nl=1+Math.floor(score/600);
  if(nl!==level){ level=nl; spawnRate=Math.max(25,80-(level-1)*8); }
}

// ── Game state ───────────────────────────────────
function startGame(){
  score=0; lives=3; level=1; spawnRate=80; frameCount=0;
  bullets=[]; asteroids=[]; particles=[];
  ship=new Ship(); shipExploding=false;
  joy.active=false; joy.dx=0; joy.dy=0;
  shootState.pressed=false;
  joyKnob.style.transform="translate(-50%,-50%)";
  joyKnob.classList.remove("active");
  initStars(); updateHUD();
  gameState=STATE.PLAYING;
  overlay.classList.add("hidden");
  controls.classList.remove("hidden");
  if(rafId) cancelAnimationFrame(rafId);
  gameLoop();
}

function triggerGameOver(){
  gameState=STATE.GAME_OVER;
  controls.classList.add("hidden");
  // Save high score
  if(score > highScore){
    highScore = score;
    localStorage.setItem("cosmicHighScore", highScore);
  }
  ovTitle.innerHTML="GAME<br>OVER";
  ovSub.textContent="You survived as long as you could…";
  ovScore.style.display=""; ovScore.textContent="SCORE: "+score;
  ovBest.style.display="";  ovBest.textContent="🏆 BEST: "+highScore;
  startBtn.textContent="▶ PLAY AGAIN";
  overlay.classList.remove("hidden");
}

startBtn.addEventListener("click", startGame);
startBtn.addEventListener("touchstart", e=>{ e.preventDefault(); startGame(); },{passive:false});

// ── Game loop ────────────────────────────────────
function gameLoop(){
  rafId=requestAnimationFrame(gameLoop);
  if(gameState===STATE.PLAYING) update();
  if(gameState===STATE.DYING)   updateDying();
  render();
}

function update(){
  frameCount++;
  if(frameCount%spawnRate===0) asteroids.push(new Asteroid());

  ship.update();
  bullets.forEach(b=>b.update());   bullets=bullets.filter(b=>b.alive);
  asteroids.forEach(a=>a.update());
  particles.forEach(p=>p.update()); particles=particles.filter(p=>p.life>0);

  // Bullet–Asteroid
  bullets.forEach(b=>{
    if(!b.alive) return;
    asteroids.forEach(a=>{
      if(!a.alive) return;
      if(circleRect(a.x,a.y,a.r, b.x-b.w/2,b.y,b.w,b.h)){
        b.alive=false; a.alive=false;
        score+=Math.ceil(100/a.r)*10;
        spawnExplosion(a.x,a.y,"asteroid");
        playAsteroidExplode();
        updateLevel(); updateHUD();
        if(level > 1 && score % 600 < Math.ceil(100/a.r)*10) playLevelUp();
      }
    });
  });

  // Asteroid–Ship
  if(ship.invincible===0 && !shipExploding){
    const hb=ship.hitbox;
    asteroids.forEach(a=>{
      if(!a.alive) return;
      if(circleRect(a.x,a.y,a.r*0.78, hb.x,hb.y,hb.w,hb.h)){
        a.alive=false; lives--;
        ship.invincible=0;
        updateHUD();
        if(lives<=0){
          shipExploding=true;
          spawnExplosion(ship.x,ship.y,"ship");
          playShipDeath();
          gameState=STATE.DYING;
          setTimeout(triggerGameOver, 1400);
        } else {
          spawnExplosion(ship.x,ship.y,"hit");
          playHit();
        }
      }
    });
  }
  asteroids=asteroids.filter(a=>a.alive);
}

// Keeps particles + asteroids animating during death explosion
function updateDying(){
  frameCount++;
  asteroids.forEach(a=>a.update());
  particles.forEach(p=>p.update());
  particles=particles.filter(p=>p.life>0);
}

function render(){
  ctx.fillStyle="#020810"; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Stars
  STARS.forEach(s=>{
    const p=0.45+0.55*Math.sin(frameCount*0.018+s.b*12);
    ctx.globalAlpha=0.25+0.75*p*s.b;
    ctx.fillStyle="#fff";
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  if(gameState===STATE.PLAYING||gameState===STATE.DYING){
    particles.forEach(p=>p.draw());
    asteroids.forEach(a=>a.draw());
    bullets.forEach(b=>b.draw());
    if(!shipExploding) ship.draw();
  }
}

// Animate starfield on start screen
(function bgLoop(){
  if(gameState===STATE.START){ frameCount++; render(); requestAnimationFrame(bgLoop); }
})();
</script>
